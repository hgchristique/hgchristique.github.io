<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HG CHRISTIQUE</title>
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1)) +
      (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
      l.hash
    );
  </script>
</head>
</html>
